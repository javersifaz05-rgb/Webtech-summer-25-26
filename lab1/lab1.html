<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank Account Registration</title>
</head>
<body>

  
    
    <div class="container">
        <form action="#" method="POST">
            
           
            <fieldset>
                <legend>Bank Account Registration</legend>
                <table>
                    <h1 style="color: red;">bank account registation</h1>
                    
                    <tr>
                        <td><label for="acc-name">Account Name:</label></td>
                        <td><input type="text" id="acc-name" name="account_name" required></td>
                    </tr>
                    
                    
                    <tr>
                        <td><label for="acc-phone">Account Phone:</label></td>
                        <td><input type="tel" id="acc-phone" name="account_phone" required></td>
                    </tr>
                    
                 
                    <tr>
                        <td><label for="acc-email">Account Email:</label></td>
                        <td><input type="email" id="acc-email" name="account_email" required></td>
                    </tr>
                    
                    
                    <tr>
                        <td><label for="acc-address">Account Address:</label></td>
                        <td><textarea id="acc-address" name="account_address" rows="3" placeholder="Enter your full address"></textarea></td>
                    </tr>
                </table>
            </fieldset>

          
            <fieldset>
                <legend>Personal Account Information Info</legend>
                <table>
                    <!-- Username -->
                    <tr>
                        <td><label for="username">Username:</label></td>
                        <td><input type="text" id="username" name="username" required></td>
                    </tr>
                    
                   
                    <tr>
                        <td><label for="password">Password:</label></td>
                        <td><input type="password" id="password" name="password" required></td>
                    </tr>
                    
                   
                    <tr>
                        <td><label for="confirm-password">Confirm Password:</label></td>
                        <td><input type="password" id="confirm-password" name="confirm_password" required></td>
                    </tr>
                </table>
            </fieldset>

           
            <br>
            <input type="submit" value="Register Account">

        </form>
    </div>

</body>
</html>
