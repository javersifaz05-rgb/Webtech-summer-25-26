<!DOCTYPE html>
<html lang="en">

<head>
    <title>User Registation Account </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <form>

            <fieldset>
                <legend>User Registration Form</legend>
                <table>
                    <tr>
                        <td><label for="name"> Name <span class="required">*</span></label></td>
                        <td><input type="text" id="acc-name" name="account_name" required></td>
                    </tr>
                    <tr>
                        <td><label for="phone"> Phone <span class="required">*</span></label></td>
                        <td><input type="tel" id="phone" name="account_phone" required></td>
                    </tr>
                    <tr>
                        <td><label for="acc-email">Email <span class="required">*</span></label></td>
                        <td><input type="email" id="acc-email" name="account_email" required></td>
                    </tr>
                    <tr>
                        <td><label for="acc-address"> Address <span class="required">*</span></label></td>
                        <td><textarea id="acc-address" name="account_address" placeholder="Enter your full address"
                                required></textarea></td>
                    </tr>

                    <tr>
                        <td><label>Account Type <span class="required">*</span></label></td>
                        <td>
                            <input type="radio" id="savings" name="acc_type" value="savings" required>
                            <label for="savings">Savings</label>

                            <input type="radio" id="current" name="acc_type" value="current" required>
                            <label for="current">Current</label>
                        </td>
                    </tr>A
            </fieldset>

            <fieldset>
                <legend> Information Info</legend>
                <table>
                    <tr>
                        <td><label for="username">Username <span class="required">*</span></label></td>
                        <td><input type="text" id="username" name="username" required></td>
                    </tr>
                    <tr>
                        <td><label for="password">Password <span class="required">*</span></label></td>
                        <td><input type="password" id="password" name="password" required></td>
                    </tr>
                    <tr>
                        <td><label for="confirm-password">Confirm Password <span class="required">*</span></label></td>
                        <td><input type="password" id="confirm-password" name="confirm_password" required></td>
                    </tr>

                    <tr>
                        <td></td>
                        <td>
                            <input type="checkbox" id="terms" name="terms" required>
                            <label for="terms">I agree to the Terms and Conditions <span
                                    class="required">*</span></label>
                        </td>
                    </tr>
                </table>
            </fieldset>

            <br>
            <input type="submit" value="Register Account">

        </form>
    </div>

</body>

</html>
