<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Account Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Bank Account Registration</h2>
        <form action="#">
            
            <div class="input-group">
                <label for="acc-name">Account Name</label>
                <input type="text" id="acc-name" placeholder="Enter full name" required>
            </div>

            <div class="input-group">
                <label for="acc-phone">Account Phone</label>
                <input type="tel" id="acc-phone" placeholder="Enter phone number" required>
            </div>

            <div class="input-group">
                <label for="acc-email">Email Address</label>
                <input type="email" id="acc-email" placeholder="Enter email address" required>
            </div>

            <div class="input-group">
                <label for="acc-type">Account Type</label>
                <select id="acc-type">
                    <option value="savings">Savings Account</option>
                    <option value="current">Current Account</option>
                    <option value="student">Student Account</option>
                </select>
            </div>

            <button type="submit" class="btn">Register Account</button>
        </form>
    </div>

</body>
</html>
